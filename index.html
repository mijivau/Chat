<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uk MindCare Pharmacy - Price List</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .pharmacy-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #005eb8;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .header h1 {
            color: #005eb8;
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
        }

        .medicine-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .medicine-header {
            padding: 15px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .med-info-top {
            display: flex;
            flex-direction: column;
        }

        .med-name {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .generic-name {
            font-size: 12px;
            color: #777;
            font-style: italic;
        }

        .icon {
            color: #005eb8;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
        }

        .price-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #f1f7ff;
        }

        .details-content {
            padding: 15px;
            border-top: 1px dashed #005eb8;
            font-size: 14px;
            color: #2c3e50;
        }

        .qty-selector {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #005eb8;
        }

        .total-price-box {
            font-weight: bold;
            color: #d32f2f;
            margin: 10px 0;
        }

        .copy-btn {
            padding: 10px;
            background-color: #005eb8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            transition: 0.2s;
        }

        .copy-btn:hover { background-color: #004a94; }

        .medicine-item.active .price-details { max-height: 300px; }
        .medicine-item.active .icon { transform: rotate(45deg); color: #d32f2f; }
    </style>
</head>
<body>

<div class="pharmacy-container">
    <div class="header">
        <h1>Uk MindCare Pharmacy</h1>
        <p style="font-size: 12px; color: #666;">Select Strips & Copy Details</p>
    </div>

    <div id="medicine-list"></div>
</div>

<script>
    // Data from your image
    const medicines = [
        { name: "Easium Diaz", generic: "Diazepam", price: 0.9, minQty: 40 },
        { name: "Sedil 5mg", generic: "Diazepam", price: 1, minQty: 20 },
        { name: "Valium Dows 10 mg", generic: "Diazepam", price: 1.5, minQty: 10 },
        { name: "Pase2", generic: "Clonazepam", price: 1.4, minQty: 15 },
        { name: "Alprax 1mg", generic: "Alprazolam", price: 1.4, minQty: 10 },
        { name: "Alprax 2mg", generic: "Alprazolam", price: 1.8, minQty: 10 },
        { name: "Nitraz 5mg", generic: "Nitrazepam", price: 1, minQty: 10 },
        { name: "Bromazepam 3mg", generic: "Lexotanil", price: 1, minQty: 10 },
        { name: "Midazolam 7.5mg", generic: "Dormicum", price: 1.4, minQty: 10 },
        { name: "Rivotril 2mg", generic: "Clonazepam", price: 1.6, minQty: 10 },
        { name: "Ativan Loraz 2mg", generic: "Lorazepam", price: 1.5, minQty: 30 },
        { name: "Rlam 1mg", generic: "Alprazolam", price: 1.3, minQty: 15 },
        { name: "Etizolam", generic: "Etilaam", price: 1.5, minQty: 10 },
        { name: "Modafinil 200mg", generic: "Provigil", price: 1, minQty: 10 },
        { name: "Temaz", generic: "Temazepam", price: 1.5, minQty: 14 },
        { name: "Zopi 10mg", generic: "Zopiclone", price: 0.9285, minQty: 14 },
        { name: "Ritalin", generic: "Methylphenidate", price: 3, minQty: 10 },
        { name: "Co-codamol", generic: "Codeine Mix", price: 1.3, minQty: 10 },
        { name: "Aspadol 200mg", generic: "Tapentadol", price: 1.5, minQty: 10 },
        { name: "Tapenta 200mg", generic: "Tapentadol", price: 1.4, minQty: 10 },
        { name: "Tramadol 100mg", generic: "Ultram/Tramal", price: 1.5, minQty: 10 },
        { name: "Royal 225mg", generic: "Tramadol HCl", price: 0.5, minQty: 10 },
        { name: "Pregabalin", generic: "Lyrica", price: 1, minQty: 15 },
        { name: "Tapentadol 100mg", generic: "Tprexadol", price: 1.5, minQty: 10 },
        { name: "Pain o Soma 350mg", generic: "Carisoprodol", price: 1.6, minQty: 10 }
    ];

    const container = document.getElementById('medicine-list');

    medicines.forEach((med, index) => {
        const item = document.createElement('div');
        item.className = 'medicine-item';
        
        // Calculate 1 Strip Price
        const oneStripPrice = (med.price * med.minQty).toFixed(2);

        item.innerHTML = `
            <div class="medicine-header" onclick="this.parentElement.classList.toggle('active')">
                <div class="med-info-top">
                    <span class="med-name">${med.name}</span>
                    <span class="generic-name">${med.generic}</span>
                </div>
                <span class="icon">+</span>
            </div>
            <div class="price-details">
                <div class="details-content">
                    <div class="qty-selector">
                        <label>Select Strips:</label>
                        <select id="qty-${index}" onchange="updatePrice(${index})">
                            <option value="1">1 Strip</option>
                            <option value="2">2 Strips</option>
                            <option value="3">3 Strips</option>
                            <option value="4">4 Strips</option>
                            <option value="5">5 Strips</option>
                        </select>
                    </div>
                    <div class="total-price-box" id="display-${index}">
                        1 Strip £${oneStripPrice} (${med.minQty} Pcs)
                    </div>
                    <button class="copy-btn" onclick="copyMed(${index})">Copy Order Details</button>
                </div>
            </div>
        `;
        container.appendChild(item);
    });

    function updatePrice(index) {
        const med = medicines[index];
        const qty = document.getElementById(`qty-${index}`).value;
        const totalPrice = (med.price * med.minQty * qty).toFixed(2);
        const totalPcs = med.minQty * qty;
        
        document.getElementById(`display-${index}`).innerText = 
            `${qty} Strip £${totalPrice} (${totalPcs} Pcs)`;
    }

    function copyMed(index) {
        const med = medicines[index];
        const qty = document.getElementById(`qty-${index}`).value;
        const totalPrice = (med.price * med.minQty * qty).toFixed(2);
        const totalPcs = med.minQty * qty;
        
        const textToCopy = `${med.name} (${med.generic})\nQty: ${qty} Strip (${totalPcs} Pieces)\n £${totalPrice}`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('Order Details Copied!');
        });
    }
</script>

</body>
</html>
